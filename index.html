<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Albion Crafting Guide</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="app-header">
        <div class="header-title">
            <h1>Albion Crafting Guide</h1>
            <span class="subtitle">Wiki Item Search & Crafting Tree</span>
        </div>
        <div class="search-container">
            <input type="search" id="search-input" placeholder="Cerca oggetto o materiale..." autocomplete="off" spellcheck="false">
            <button id="search-btn" aria-label="Cerca">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
        </div>
    </header>

    <main id="app-main">
        <section id="search-results" class="hidden"></section>
        <section id="item-detail" class="hidden"></section>
        <section id="welcome-screen">
            <div class="welcome-content">
                <div class="welcome-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                </div>
                <h2>Cerca un oggetto</h2>
                <p>Digita il nome di un'arma, armatura, materiale o risorsa per vedere come craftarlo e ottenere tutte le sue componenti.</p>
                <div class="quick-searches">
                    <span class="quick-tag" data-search="Broadsword">Broadsword</span>
                    <span class="quick-tag" data-search="Plate Armor">Plate Armor</span>
                    <span class="quick-tag" data-search="Steel Bar">Steel Bar</span>
                    <span class="quick-tag" data-search="Healing Staff">Healing Staff</span>
                    <span class="quick-tag" data-search="Crossbow">Crossbow</span>
                    <span class="quick-tag" data-search="Leather Hood">Leather Hood</span>
                </div>
            </div>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span id="loading-text">Caricamento...</span>
    </div>

    <nav id="back-nav" class="hidden">
        <button id="back-btn" aria-label="Indietro">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m15 18-6-6 6-6"/>
            </svg>
            Indietro
        </button>
    </nav>

    <script src="js/wiki-api.js"></script>
    <script src="js/crafting-tree.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
